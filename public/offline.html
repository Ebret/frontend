<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline | Cooperative E-Wallet</title>
  <meta name="description" content="You are currently offline. Please check your internet connection.">
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: var(--gray-50);
      color: var(--gray-900);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .container {
      max-width: 28rem;
      width: 100%;
      text-align: center;
      background-color: white;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      padding: 2rem;
    }
    
    .icon {
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1.5rem;
      color: var(--primary);
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 1rem;
    }
    
    p {
      color: var(--gray-700);
      margin-bottom: 1.5rem;
    }
    
    .button {
      display: inline-block;
      background-color: var(--primary);
      color: white;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    
    .button:hover {
      background-color: var(--primary-dark);
    }
    
    .footer {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: var(--gray-700);
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    
    <h1>You're Offline</h1>
    
    <p>
      It looks like you've lost your internet connection. Please check your connection and try again.
    </p>
    
    <a href="/" class="button" id="retry-button">Try Again</a>
  </div>
  
  <div class="footer">
    &copy; Cooperative E-Wallet
  </div>
  
  <script>
    // Check if the user is back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
    
    // Retry button
    document.getElementById('retry-button').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.reload();
    });
  </script>
</body>
</html>
