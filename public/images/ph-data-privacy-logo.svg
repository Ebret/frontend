<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0038A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CE1126;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="white" stroke="url(#gradient)" stroke-width="5"/>
  <g transform="translate(50, 50)">
    <!-- Shield outline -->
    <path d="M50,0 L100,20 L100,60 C100,90 75,100 50,120 C25,100 0,90 0,60 L0,20 L50,0z" fill="#f2f2f2" stroke="#0038A8" stroke-width="3"/>
    <!-- Lock symbol -->
    <rect x="35" y="50" width="30" height="25" rx="2" ry="2" fill="#CE1126"/>
    <rect x="40" y="35" width="20" height="25" rx="10" ry="10" fill="none" stroke="#CE1126" stroke-width="5"/>
    <!-- Stars (from Philippine flag) -->
    <polygon points="25,15 28,24 20,18 30,18 22,24" fill="#FCD116"/>
    <polygon points="75,15 78,24 70,18 80,18 72,24" fill="#FCD116"/>
    <polygon points="50,85 53,94 45,88 55,88 47,94" fill="#FCD116"/>
  </g>
  <!-- Text around the circle -->
  <path id="textPath" d="M100,20 A80,80 0 1,1 99.9,20" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0038A8">
    <textPath xlink:href="#textPath" startOffset="5%">PHILIPPINES DATA PRIVACY ACT OF 2012 (RA 10173)</textPath>
  </text>
</svg>
